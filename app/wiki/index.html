<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outline Wiki</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #2f3542;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        main {
            max-width: 900px;
            margin: auto;
            padding: 1rem;
        }
        .wiki-link {
            display: block;
            padding: 0.8rem;
            margin: 0.5rem 0;
            background: white;
            border-radius: 5px;
            text-decoration: none;
            color: #2f3542;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .wiki-link:hover {
            background: #f1f1f1;
        }
    </style>
</head>
<body>

<header>
    <h1>📚 Outline Wiki</h1>
    <p>Your team knowledge base</p>
</header>

<main>
    <h2>Recent Wiki Pages</h2>
    <div id="wiki-list">
        <!-- Wiki links will be injected here -->
    </div>
</main>

<script>
    // Example: Fetch pages from Outline API (requires API token)
    const API_URL = "https://your-outline-instance.com/api/documents.list";
    const API_TOKEN = "YOUR_API_TOKEN_HERE"; // Keep this secure

    async function loadWikiPages() {
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_TOKEN}`
                },
                body: JSON.stringify({ limit: 5 })
            });

            if (!response.ok) throw new Error("Failed to fetch wiki pages");

            const data = await response.json();
            const listContainer = document.getElementById("wiki-list");

            data.data.forEach(doc => {
                const link = document.createElement("a");
                link.href = `https://your-outline-instance.com/doc/${doc.urlId}`;
                link.textContent = doc.title;
                link.className = "wiki-link";
                listContainer.appendChild(link);
            });
        } catch (error) {
            console.error(error);
            document.getElementById("wiki-list").innerHTML = "<p>Unable to load wiki pages.</p>";
        }
    }

    loadWikiPages();
</script>

</body>
</html>
